version: '3.9'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-expensetracker}
      POSTGRES_USER: ${POSTGRES_USER:-expenseuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-expensepass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-expenseuser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-super-secret-key-change-in-production}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      - POSTGRES_DB=${POSTGRES_DB:-expensetracker}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-http://localhost:3124}
      - POSTGRES_USER=${POSTGRES_USER:-expenseuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-expensepass}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
    volumes:
      - media_files:/app/media
      - static_files:/app/staticfiles
      - ./import_data:/app/import_data:ro
      - ./backups:/app/backups
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py create_admin &&
             python manage.py seed_data &&
             gunicorn expense_tracker.wsgi:application --bind 0.0.0.0:8000 --workers 3"

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      - backend

  scheduler:
    build: ./backend
    restart: always
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-super-secret-key-change-in-production}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - POSTGRES_DB=${POSTGRES_DB:-expensetracker}
      - POSTGRES_USER=${POSTGRES_USER:-expenseuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-expensepass}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    volumes:
      - media_files:/app/media
      - ./backups:/app/backups
    depends_on:
      db:
        condition: service_healthy
    command: python manage.py run_scheduler

volumes:
  postgres_data:
  media_files:
  static_files:
