<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Taipei Wallet</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>💰</text></svg>">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root { --accent: #7c3aed; }
    [data-bs-theme="dark"] { --bs-body-bg: #0f0f1a; --bs-card-bg: #1a1a2e; }
    body {
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; background: var(--bs-body-bg);
    }
    .login-card {
      width: 100%; max-width: 400px;
      background: var(--bs-card-bg); border-radius: 1rem;
      padding: 2.5rem; box-shadow: 0 20px 60px rgba(0,0,0,.4);
      border: 1px solid rgba(255,255,255,.05);
    }
    .login-brand { text-align: center; margin-bottom: 2rem; }
    .login-brand .emoji { font-size: 3rem; display: block; margin-bottom: .5rem; }
    .login-brand h1 { font-size: 1.5rem; font-weight: 700; color: #a78bfa; }
    .login-brand p { font-size: .85rem; color: #64748b; margin: 0; }
    .btn-login {
      background: var(--accent); border: none; color: #fff;
      padding: .75rem; font-weight: 600; letter-spacing: .3px;
      transition: background .2s;
    }
    .btn-login:hover { background: #6d28d9; color: #fff; }
    .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 .25rem rgba(124,58,237,.25); }
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-brand">
    <span class="emoji">💰</span>
    <h1>Taipei Wallet</h1>
    <p>Personal Expense Tracker</p>
  </div>
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label small fw-semibold">Username</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-person"></i></span>
        {{ form.username }}
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label small fw-semibold">Password</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        {{ form.password }}
      </div>
    </div>
    {% if form.errors %}
    <div class="alert alert-danger py-2 small">
      <i class="bi bi-exclamation-circle me-1"></i> Invalid username or password.
    </div>
    {% endif %}
    <button type="submit" class="btn btn-login w-100 rounded-3">
      Sign In <i class="bi bi-arrow-right-short"></i>
    </button>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const saved = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-bs-theme', saved);
</script>
</body>
</html>
